```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Empréstimos Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: bold; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes toastSlide { 
            0% { opacity: 0; transform: translate(-50%, 20px); } 
            10% { opacity: 1; transform: translate(-50%, 0); }
            90% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, 20px); }
        }
        .toast-anim { animation: toastSlide 3s ease-in-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Utilitários
        const formatMoney = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        const formatDate = (dateStr) => {
            if (!dateStr) return '';
            const [year, month, day] = dateStr.split('-');
            return `${day}/${month}/${year}`;
        };
        const capitalize = (s) => s.charAt(0).toUpperCase() + s.slice(1);
        const generateId = () => Math.random().toString(36).substr(2, 9);

        // Ícones
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>;
        const IconDelete = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>;

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [fundsTransactions, setFundsTransactions] = useState([]);
            const [clients, setClients] = useState([]);
            const [selectedClient, setSelectedClient] = useState(null);
            const [toastMessage, setToastMessage] = useState('');

            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => setToastMessage(''), 3000);
            };

            // Carregar e Migrar Dados Iniciais
            useEffect(() => {
                const savedData = localStorage.getItem('loanManagerData');
                if (savedData) {
                    let parsed = JSON.parse(savedData);
                    if (parsed.fundsTransactions) setFundsTransactions(parsed.fundsTransactions);
                    if (parsed.clients) {
                        const migratedClients = parsed.clients.map(client => {
                            if (client.transactions && !client.loans) {
                                let oldLoans = client.transactions.filter(t => t.type === 'loan').sort((a,b) => new Date(a.date) - new Date(b.date));
                                let oldPayments = client.transactions.filter(t => t.type === 'payment').sort((a,b) => new Date(a.date) - new Date(b.date));
                                let newLoans = oldLoans.map(l => ({ id: l.id, date: l.date, amount: l.amount, payments: [] }));
                                if (newLoans.length > 0 && oldPayments.length > 0) newLoans[0].payments = oldPayments;
                                return { id: client.id, name: client.name, loans: newLoans };
                            }
                            return client;
                        });
                        setClients(migratedClients);
                    }
                }
            }, []);

            // Salvar dados no Cache
            useEffect(() => {
                localStorage.setItem('loanManagerData', JSON.stringify({ fundsTransactions, clients }));
            }, [fundsTransactions, clients]);

            // --- SISTEMA DE BACKUP ---
            const handleExportBackup = () => {
                const data = { fundsTransactions, clients };
                const dataStr = JSON.stringify(data, null, 2);
                const blob = new Blob([dataStr], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup_financas_${new Date().toISOString().split('T')[0]}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('✅ Backup salvo no celular!');
            };

            const handleImportBackup = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (parsed && Array.isArray(parsed.clients)) {
                            if(window.confirm('⚠️ ATENÇÃO: Isso vai apagar os dados atuais e carregar o backup. Deseja continuar?')) {
                                setFundsTransactions(parsed.fundsTransactions || []);
                                setClients(parsed.clients);
                                showToast('✅ Backup restaurado com sucesso!');
                            }
                        } else {
                            showToast('❌ O arquivo selecionado não é um backup válido.');
                        }
                    } catch (error) {
                        showToast('❌ Erro ao ler o arquivo de backup.');
                    }
                };
                reader.readAsText(file);
                e.target.value = ''; // Reseta o input para permitir importar o mesmo arquivo se necessário
            };


            // Controle de Tempo do Sistema
            const today = new Date();
            const currentMonth = today.getMonth(); 
            const currentYear = today.getFullYear();
            const nextMonthDate = new Date(currentYear, currentMonth + 1, 1);
            const nextMonth = nextMonthDate.getMonth();
            const nextYear = nextMonthDate.getFullYear();

            // Motor de Cálculos Dinâmico
            const globalStats = useMemo(() => {
                let manualFunds = fundsTransactions.reduce((acc, t) => acc + t.amount, 0);
                
                let totalLent = 0;
                let totalInterestReceived = 0;
                let totalAmortizedReceived = 0;
                let totalLoansGiven = 0;

                let totalExpectedThisMonth = 0;
                let totalPaidThisMonth = 0;
                let totalExpectedNextMonth = 0;
                let totalPaidNextMonth = 0;

                const processedClients = clients.map(client => {
                    let clientTotalDebt = 0;
                    let cExpectedThis = 0;
                    let cPaidThis = 0;
                    let cExpectedNext = 0;
                    let cPaidNext = 0;

                    const processedLoans = (client.loans || []).map(loan => {
                        let principal = loan.amount;
                        totalLoansGiven += loan.amount;
                        
                        let lPaidThis = 0;
                        let lPaidNext = 0;
                        
                        const [lYearStr, lMonthStr, lDayStr] = loan.date.split('-');
                        const loanMonth = Number(lMonthStr) - 1;
                        const loanYear = Number(lYearStr);

                        let sortedPayments = [...loan.payments].sort((a, b) => new Date(a.date) - new Date(b.date));
                        
                        const processedPayments = sortedPayments.map(p => {
                            const interestDue = principal * 0.10;
                            let interestPaid = 0, amortized = 0;

                            if (p.amount >= interestDue) {
                                interestPaid = interestDue;
                                amortized = p.amount - interestDue;
                            } else {
                                interestPaid = p.amount;
                                amortized = 0;
                            }

                            principal -= amortized;
                            if (principal < 0) principal = 0; 

                            totalInterestReceived += interestPaid;
                            totalAmortizedReceived += amortized;

                            const [pYearStr, pMonthStr, pDayStr] = p.date.split('-');
                            const pM = Number(pMonthStr) - 1;
                            const pY = Number(pYearStr);

                            const expectsZeroThisMonth = loanYear === currentYear && loanMonth === currentMonth;

                            if (pY === currentYear && pM === currentMonth) {
                                if (expectsZeroThisMonth) {
                                    lPaidNext += interestPaid;
                                } else {
                                    lPaidThis += interestPaid;
                                }
                            } else if (pY === nextYear && pM === nextMonth) {
                                lPaidNext += interestPaid;
                            }

                            return { ...p, interestPaid, amortized, balanceAfter: principal };
                        });

                        let lExpectedThis = 0;
                        let lExpectedNext = 0;
                        const baseInterest = principal * 0.10;

                        if (principal > 0) {
                            if (loanYear < currentYear || (loanYear === currentYear && loanMonth < currentMonth)) {
                                lExpectedThis = baseInterest;
                            }
                            if (loanYear < nextYear || (loanYear === nextYear && loanMonth < nextMonth)) {
                                lExpectedNext = baseInterest;
                            }
                        }

                        let lPendingThis = Math.max(0, lExpectedThis - lPaidThis);
                        
                        let lDisplayMonthStr = capitalize(today.toLocaleString('pt-BR', { month: 'short' })).replace('.', '');
                        let isLoanOK = false;
                        let loanDashPending = lPendingThis;

                        if (principal === 0) {
                            isLoanOK = true;
                        } else if (lPendingThis === 0) {
                            lDisplayMonthStr = capitalize(nextMonthDate.toLocaleString('pt-BR', { month: 'short' })).replace('.', '');
                            let lPendingNext = Math.max(0, lExpectedNext - lPaidNext);
                            loanDashPending = lPendingNext;
                            if (lPendingNext === 0) isLoanOK = true; 
                        }

                        clientTotalDebt += principal;
                        cExpectedThis += lExpectedThis;
                        cPaidThis += lPaidThis;
                        cExpectedNext += lExpectedNext;
                        cPaidNext += lPaidNext;

                        return { 
                            ...loan, 
                            processedPayments, 
                            currentPrincipal: principal, 
                            isPaidOff: principal <= 0,
                            baseInterest,
                            loanDisplayMonthStr: lDisplayMonthStr,
                            loanDashPending,
                            isLoanOK
                        };
                    }).sort((a, b) => new Date(b.date) - new Date(a.date)); 

                    let cPendingThis = Math.max(0, cExpectedThis - cPaidThis);
                    let cDisplayMonthStr = capitalize(today.toLocaleString('pt-BR', { month: 'short' })).replace('.', '');
                    let cDisplayExpected = cExpectedThis;
                    let cDisplayPending = cPendingThis;
                    let cIsNextMonth = false;

                    if (clientTotalDebt > 0 && cPendingThis === 0) {
                        cDisplayMonthStr = capitalize(nextMonthDate.toLocaleString('pt-BR', { month: 'short' })).replace('.', '');
                        cDisplayExpected = cExpectedNext;
                        cDisplayPending = Math.max(0, cDisplayExpected - cPaidNext);
                        cIsNextMonth = true;
                    }

                    totalLent += clientTotalDebt;
                    totalExpectedThisMonth += cExpectedThis;
                    totalPaidThisMonth += cPaidThis;
                    totalExpectedNextMonth += cExpectedNext;
                    totalPaidNextMonth += cPaidNext;

                    return { 
                        ...client, 
                        currentDebt: clientTotalDebt, 
                        loans: processedLoans,
                        dashMonthStr: cDisplayMonthStr,
                        dashExpected: cDisplayExpected,
                        dashPending: cDisplayPending,
                        isNextMonth: cIsNextMonth
                    }; 
                });

                const availableMoney = manualFunds + totalInterestReceived + totalAmortizedReceived - totalLoansGiven;
                
                let overPendingThis = Math.max(0, totalExpectedThisMonth - totalPaidThisMonth);
                let dashMonthStr = capitalize(today.toLocaleString('pt-BR', { month: 'long' }));
                let dashExpected = totalExpectedThisMonth;
                let dashPaid = totalPaidThisMonth;
                let dashPending = overPendingThis;

                if (totalLent > 0 && overPendingThis === 0) {
                    dashMonthStr = capitalize(nextMonthDate.toLocaleString('pt-BR', { month: 'long' }));
                    dashExpected = totalExpectedNextMonth;
                    dashPaid = totalPaidNextMonth;
                    dashPending = Math.max(0, dashExpected - dashPaid);
                }

                return { 
                    availableMoney, 
                    totalLent, 
                    processedClients,
                    dashMonthStr,
                    dashExpected,
                    dashPaid,
                    dashPending
                };
            }, [clients, fundsTransactions, currentMonth, currentYear, nextMonth, nextYear]);


            // --- COMPONENTE PAINEL ---
            const Dashboard = ({ onExport, onImport }) => {
                const [addAmount, setAddAmount] = useState('');
                const fileInputRef = useRef(null);

                const handleFund = (action) => {
                    if (!addAmount || Number(addAmount) <= 0) return;
                    let val = Number(addAmount);
                    if (action === 'remove') {
                        if (val > globalStats.availableMoney) {
                            showToast('❌ Saldo insuficiente para essa retirada.');
                            return;
                        }
                        val = -val;
                    }
                    setFundsTransactions([{ id: generateId(), date: new Date().toISOString().split('T')[0], amount: val }, ...fundsTransactions]);
                    setAddAmount('');
                    showToast(action === 'add' ? '💰 Saldo adicionado!' : '💸 Saldo retirado!');
                };

                return (
                    <div className="p-4 space-y-6 pb-20">
                        {/* Cards Principais */}
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-blue-600 text-white rounded-2xl p-5 shadow-lg relative overflow-hidden">
                                <p className="text-blue-100 text-sm font-medium relative z-10">Total Disponível</p>
                                <p className="text-2xl font-bold mt-1 relative z-10">{formatMoney(globalStats.availableMoney)}</p>
                            </div>
                            <div className="bg-orange-500 text-white rounded-2xl p-5 shadow-lg relative overflow-hidden">
                                <p className="text-orange-100 text-sm font-medium relative z-10">Total na Rua</p>
                                <p className="text-2xl font-bold mt-1 relative z-10">{formatMoney(globalStats.totalLent)}</p>
                            </div>
                        </div>

                        {/* Recebimentos do Mês */}
                        <div className="bg-white rounded-2xl p-5 shadow-md border border-gray-100">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="font-bold text-gray-800 text-lg">Mês de {globalStats.dashMonthStr}</h3>
                            </div>
                            
                            <div className="bg-red-50 border border-red-100 rounded-xl p-4 text-center mb-4">
                                <p className="text-red-700 text-xs font-black uppercase tracking-widest mb-1">Falta Receber (Pendentes)</p>
                                <p className="text-4xl font-black text-red-600">{formatMoney(globalStats.dashPending)}</p>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-3">
                                <div className="bg-green-50 p-3 rounded-xl border border-green-100 text-center">
                                    <p className="text-[10px] text-green-700 font-bold uppercase mb-1">Já Recebido</p>
                                    <p className="font-bold text-green-800 text-sm">{formatMoney(globalStats.dashPaid)}</p>
                                </div>
                                <div className="bg-gray-50 p-3 rounded-xl border border-gray-200 text-center">
                                    <p className="text-[10px] text-gray-500 font-bold uppercase mb-1">Meta do Mês</p>
                                    <p className="font-bold text-gray-700 text-sm">{formatMoney(globalStats.dashExpected)}</p>
                                </div>
                            </div>
                        </div>

                        {/* Movimentar Caixa */}
                        <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                            <h3 className="text-lg font-bold text-gray-800 mb-3">Movimentar Caixa Pessoal</h3>
                            <div className="flex flex-col gap-3">
                                <input type="number" step="0.01" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3" placeholder="Valor (R$)" value={addAmount} onChange={(e) => setAddAmount(e.target.value)} />
                                <div className="flex gap-2">
                                    <button onClick={() => handleFund('add')} className="flex-1 bg-gray-800 text-white py-3 rounded-xl font-bold">+ Adicionar</button>
                                    <button onClick={() => handleFund('remove')} className="flex-1 bg-red-100 text-red-700 py-3 rounded-xl font-bold shadow-sm">- Retirar</button>
                                </div>
                            </div>
                            
                            {fundsTransactions.length > 0 && (
                                <div className="mt-4 border-t border-gray-100 pt-4">
                                    <h3 className="text-xs font-bold text-gray-400 mb-2 uppercase">Histórico do Caixa:</h3>
                                    <div className="space-y-2">
                                        {fundsTransactions.map(t => (
                                            <div key={t.id} className="bg-gray-50 p-2 rounded-lg flex justify-between items-center border border-gray-100">
                                                <div className="flex items-center gap-2">
                                                    <div className={`w-6 h-6 text-xs rounded-full flex items-center justify-center font-bold ${t.amount > 0 ? 'bg-blue-100 text-blue-600' : 'bg-red-100 text-red-600'}`}>
                                                        {t.amount > 0 ? '+' : '-'}
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-sm text-gray-800">{formatMoney(Math.abs(t.amount))}</p>
                                                        <p className="text-[10px] text-gray-400">{formatDate(t.date)}</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => { setFundsTransactions(fundsTransactions.filter(f => f.id !== t.id)); showToast('🗑️ Registro apagado.'); }} className="p-2 text-gray-400 hover:text-red-600"><IconDelete /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* NOVO: Segurança e Backup */}
                        <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-200">
                            <h3 className="text-lg font-bold text-gray-800 mb-1">Segurança e Backup</h3>
                            <p className="text-xs text-gray-500 mb-4">Salve seus dados num arquivo de texto. Se trocar de celular ou limpar o navegador, você poderá restaurá-los aqui.</p>
                            
                            <div className="flex gap-2">
                                <button onClick={onExport} className="flex-1 bg-blue-50 text-blue-800 py-3 rounded-xl font-bold shadow-sm text-sm border border-blue-200 active:bg-blue-100">
                                    📥 Salvar Backup
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="flex-1 bg-gray-50 text-gray-800 py-3 rounded-xl font-bold shadow-sm text-sm border border-gray-200 active:bg-gray-100">
                                    📤 Importar
                                </button>
                                <input type="file" accept=".txt,.json" ref={fileInputRef} style={{ display: 'none' }} onChange={onImport} />
                            </div>
                        </div>

                    </div>
                );
            };

            // --- COMPONENTE LISTA DE CLIENTES ---
            const ClientsList = () => {
                const [newClientName, setNewClientName] = useState('');

                const handleAddClient = (e) => {
                    e.preventDefault();
                    if (!newClientName.trim()) return;
                    setClients([{ id: generateId(), name: newClientName, loans: [] }, ...clients]);
                    setNewClientName('');
                    showToast('👤 Cliente criado!');
                };

                return (
                    <div className="p-4 space-y-6 pb-20">
                        <form onSubmit={handleAddClient} className="flex gap-2 mb-6">
                            <input type="text" required className="flex-1 bg-white border border-gray-200 shadow-sm rounded-xl px-4 py-3" placeholder="Nome do novo cliente" value={newClientName} onChange={(e) => setNewClientName(e.target.value)} />
                            <button type="submit" className="bg-blue-600 text-white px-5 py-3 rounded-xl font-medium shadow-md">Criar</button>
                        </form>

                        <div className="space-y-3">
                            {globalStats.processedClients.map(client => (
                                <div key={client.id} onClick={() => setSelectedClient(client)} className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex justify-between items-center cursor-pointer active:scale-95 transition-transform">
                                    <div className="flex-1">
                                        <p className="font-bold text-gray-800 text-lg">{client.name}</p>
                                        
                                        {client.currentDebt > 0 ? (
                                            <div className="mt-1 flex items-center gap-2">
                                                {client.dashPending <= 0 ? (
                                                    <span className="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-0.5 rounded uppercase">
                                                        OK ({client.dashMonthStr}) ✅
                                                    </span>
                                                ) : (
                                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded uppercase ${client.isNextMonth ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700'}`}>
                                                        Falta {client.dashMonthStr}: {formatMoney(client.dashPending)}
                                                    </span>
                                                )}
                                            </div>
                                        ) : (
                                            <p className="text-xs text-gray-400 mt-1">Sem dívidas ativas</p>
                                        )}
                                    </div>
                                    <div className="text-right">
                                        <p className="text-xs text-gray-500">Dívida Total</p>
                                        <p className={`font-bold ${client.currentDebt > 0 ? 'text-red-500' : 'text-green-600'}`}>
                                            {formatMoney(client.currentDebt)}
                                        </p>
                                    </div>
                                </div>
                            ))}
                            {clients.length === 0 && <p className="text-center text-gray-500 mt-10">Nenhum cliente cadastrado.</p>}
                        </div>
                    </div>
                );
            };

            // --- COMPONENTE VISÃO DO CLIENTE ---
            const ClientView = ({ clientData, availableMoney }) => {
                const [showNewLoanForm, setShowNewLoanForm] = useState(false);
                const [newLoanAmount, setNewLoanAmount] = useState('');
                const [newLoanDate, setNewLoanDate] = useState(new Date().toISOString().split('T')[0]);

                const [payingLoanId, setPayingLoanId] = useState(null); 
                const [paymentAmount, setPaymentAmount] = useState('');
                const [paymentDate, setPaymentDate] = useState(new Date().toISOString().split('T')[0]);

                const [confirmDeleteClient, setConfirmDeleteClient] = useState(false);
                const [editingLoan, setEditingLoan] = useState(null); 
                const [confirmDeleteLoanId, setConfirmDeleteLoanId] = useState(null);
                const [editingPayment, setEditingPayment] = useState(null); 
                const [confirmDeletePaymentId, setConfirmDeletePaymentId] = useState(null); 

                const executeDeleteClient = () => {
                    setClients(clients.filter(c => c.id !== clientData.id));
                    setSelectedClient(null);
                    showToast('🗑️ Cliente deletado.');
                };

                const handleAddLoan = (e) => {
                    e.preventDefault();
                    const amountToLend = Number(newLoanAmount);
                    if (!amountToLend || amountToLend <= 0) return;
                    
                    if (amountToLend > availableMoney) {
                        showToast('❌ Saldo insuficiente para este empréstimo!');
                        return;
                    }

                    const updatedClients = clients.map(c => {
                        if (c.id === clientData.id) {
                            return { ...c, loans: [{ id: generateId(), date: newLoanDate, amount: amountToLend, payments: [] }, ...c.loans] };
                        }
                        return c;
                    });
                    setClients(updatedClients);
                    setNewLoanAmount('');
                    setShowNewLoanForm(false);
                    showToast('💸 Empréstimo registrado!');
                };

                const executeDeleteLoan = (loanId) => {
                    const updatedClients = clients.map(c => c.id === clientData.id ? { ...c, loans: c.loans.filter(l => l.id !== loanId) } : c);
                    setClients(updatedClients);
                    setConfirmDeleteLoanId(null);
                    showToast('🗑️ Contrato apagado.');
                };

                const handleSaveEditLoan = (e) => {
                    e.preventDefault();
                    const newAmount = Number(editingLoan.amount);
                    if (!newAmount || newAmount <= 0) return;

                    const originalLoan = clientData.loans.find(l => l.id === editingLoan.id);
                    const diff = newAmount - originalLoan.amount; 
                    if (diff > 0 && diff > availableMoney) {
                         showToast('❌ Saldo insuficiente para aumentar o empréstimo!');
                         return;
                    }

                    const updatedClients = clients.map(c => {
                        if (c.id === clientData.id) {
                            return {
                                ...c,
                                loans: c.loans.map(l => l.id === editingLoan.id ? { ...l, date: editingLoan.date, amount: newAmount } : l)
                            };
                        }
                        return c;
                    });
                    setClients(updatedClients);
                    setEditingLoan(null);
                    showToast('✅ Contrato editado!');
                };

                const handleAddPayment = (e) => {
                    e.preventDefault();
                    if (!paymentAmount) return;
                    const updatedClients = clients.map(c => {
                        if (c.id === clientData.id) {
                            return {
                                ...c,
                                loans: c.loans.map(l => l.id === payingLoanId ? { ...l, payments: [...l.payments, { id: generateId(), date: paymentDate, amount: Number(paymentAmount) }] } : l)
                            };
                        }
                        return c;
                    });
                    setClients(updatedClients);
                    setPaymentAmount('');
                    setPayingLoanId(null);
                    showToast('✅ Pagamento registrado!');
                };

                const executeDeletePayment = () => {
                    if(!confirmDeletePaymentId) return;
                    const { loanId, id } = confirmDeletePaymentId;
                    const updatedClients = clients.map(c => {
                        if (c.id === clientData.id) {
                            return {
                                ...c,
                                loans: c.loans.map(l => l.id === loanId ? { ...l, payments: l.payments.filter(p => p.id !== id) } : l)
                            };
                        }
                        return c;
                    });
                    setClients(updatedClients);
                    setConfirmDeletePaymentId(null);
                    showToast('🗑️ Pagamento apagado.');
                };

                const handleSaveEditPayment = (e) => {
                    e.preventDefault();
                    if (!editingPayment.amount) return;
                    const updatedClients = clients.map(c => {
                        if (c.id === clientData.id) {
                            return {
                                ...c,
                                loans: c.loans.map(l => l.id === editingPayment.loanId ? {
                                    ...l,
                                    payments: l.payments.map(p => p.id === editingPayment.id ? { ...p, date: editingPayment.date, amount: Number(editingPayment.amount) } : p)
                                } : l)
                            };
                        }
                        return c;
                    });
                    setClients(updatedClients);
                    setEditingPayment(null);
                    showToast('✅ Pagamento editado!');
                };

                const generateStatement = () => {
                    let text = `*Extrato de Empréstimos - ${clientData.name}*\n`;
                    text += `Gerado em: ${formatDate(new Date().toISOString().split('T')[0])}\n\n`;
                    
                    if (clientData.loans.length === 0) text += `Nenhum contrato ativo.\n`;

                    clientData.loans.forEach(loan => {
                        text += `📌 *Empréstimo: ${formatMoney(loan.amount)} (${formatDate(loan.date)})*\n`;
                        if (loan.isPaidOff) {
                            text += `   ✅ Contrato Quitado!\n\n`;
                        } else {
                            if (loan.processedPayments.length > 0) {
                                loan.processedPayments.forEach(p => {
                                    text += `   🟢 ${formatDate(p.date)}: Pagou ${formatMoney(p.amount)}\n`;
                                    text += `      (Juros: ${formatMoney(p.interestPaid)} | Abateu: ${formatMoney(p.amortized)})\n`;
                                });
                            } else {
                                text += `   ▪️ Nenhum pagamento registrado.\n`;
                            }
                            text += `   *Saldo Devedor Deste:* ${formatMoney(loan.currentPrincipal)}\n`;
                            text += `   *(Próx. Juros: ${formatMoney(loan.baseInterest)})*\n`;
                            text += `   *🎯 QUITAÇÃO DESTE: ${formatMoney(loan.currentPrincipal + loan.baseInterest)}*\n\n`;
                        }
                    });

                    text += `------------------------\n`;
                    text += `*TOTAL DEVEDOR (PRINCIPAL): ${formatMoney(clientData.currentDebt)}*\n`;
                    text += `*🎯 TOTAL PARA QUITAR TUDO: ${formatMoney(clientData.currentDebt + clientData.dashExpected)}*\n`;

                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try { document.execCommand('copy'); showToast('📋 Extrato copiado com sucesso!'); } 
                    catch (err) { showToast('❌ Erro ao copiar.'); }
                    document.body.removeChild(textArea);
                };

                return (
                    <div className="p-4 flex flex-col h-screen bg-gray-50 absolute top-0 left-0 w-full z-10 overflow-y-auto pb-24">
                        <div className="flex items-center justify-between mb-6 pt-2">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setSelectedClient(null)} className="p-2 bg-white rounded-full shadow text-gray-600 active:bg-gray-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
                                </button>
                                <h2 className="text-2xl font-bold text-gray-800">{clientData.name}</h2>
                            </div>
                            <button onClick={() => setConfirmDeleteClient(true)} className="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-full transition-colors"><IconDelete /></button>
                        </div>

                        {confirmDeleteClient && (
                            <div className="bg-red-50 p-4 rounded-2xl border border-red-200 mb-6 text-center animate-fade-in shadow-sm">
                                <p className="text-red-800 font-bold mb-3">Apagar cliente e todo o histórico?</p>
                                <div className="flex gap-2">
                                    <button onClick={() => setConfirmDeleteClient(false)} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-medium">Cancelar</button>
                                    <button onClick={executeDeleteClient} className="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold shadow-sm">Sim, Apagar</button>
                                </div>
                            </div>
                        )}

                        <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-6 text-center">
                            <p className="text-gray-500 text-sm font-medium mb-1">Dívida Principal (Todos contratos)</p>
                            <p className="text-3xl font-black text-gray-800">{formatMoney(clientData.currentDebt)}</p>
                            
                            <div className="mt-3 inline-block bg-blue-100 text-blue-900 px-5 py-2.5 rounded-xl text-md font-bold w-full shadow-sm border border-blue-200">
                                Quitação Total de Tudo: {formatMoney(clientData.currentDebt + clientData.dashExpected)}
                            </div>

                            <div className="mt-4 flex gap-2 justify-center">
                                <button onClick={() => setShowNewLoanForm(!showNewLoanForm)} className="flex-1 bg-blue-600 text-white px-3 py-2.5 rounded-xl text-sm font-bold shadow-sm">+ Empréstimo</button>
                                <button onClick={generateStatement} className="flex-1 bg-gray-800 text-white px-3 py-2.5 rounded-xl text-sm font-bold shadow-sm">Copiar Extrato</button>
                            </div>
                        </div>

                        {showNewLoanForm && (
                            <form onSubmit={handleAddLoan} className="bg-white p-4 rounded-2xl shadow-lg border border-gray-200 mb-6 animate-fade-in">
                                <div className="flex justify-between items-center mb-3">
                                    <h3 className="font-bold text-gray-800">Novo Empréstimo</h3>
                                    <span className="text-xs bg-blue-50 text-blue-700 px-2 py-1 rounded border border-blue-100 font-medium">Caixa: {formatMoney(availableMoney)}</span>
                                </div>
                                <input type="date" value={newLoanDate} onChange={e => setNewLoanDate(e.target.value)} required className="w-full mb-3 p-3 border rounded-xl bg-gray-50" />
                                <input type="number" step="0.01" value={newLoanAmount} onChange={e => setNewLoanAmount(e.target.value)} placeholder="Valor (R$)" required className="w-full mb-4 p-3 border rounded-xl bg-gray-50" />
                                <div className="flex gap-2">
                                    <button type="button" onClick={() => setShowNewLoanForm(false)} className="flex-1 p-3 bg-gray-100 rounded-xl font-medium">Cancelar</button>
                                    <button type="submit" className="flex-1 p-3 bg-blue-600 text-white rounded-xl font-bold">Salvar</button>
                                </div>
                            </form>
                        )}

                        <h3 className="font-bold text-gray-800 mb-3 ml-1">Contratos em Aberto</h3>

                        <div className="space-y-4">
                            {clientData.loans.map((loan) => (
                                <div key={loan.id} className={`bg-white rounded-2xl shadow-sm border-2 ${loan.isPaidOff ? 'border-green-200 opacity-70' : 'border-gray-200'} overflow-hidden relative`}>
                                    
                                    {editingLoan && editingLoan.id === loan.id ? (
                                        <form onSubmit={handleSaveEditLoan} className="p-4 bg-gray-100 border-b border-gray-200 animate-fade-in">
                                            <p className="text-xs font-bold text-blue-700 mb-2">Editando Contrato</p>
                                            <div className="flex gap-2 mb-2">
                                                <input type="date" required value={editingLoan.date} onChange={e => setEditingLoan({...editingLoan, date: e.target.value})} className="w-1/3 p-2 border rounded-lg text-sm" />
                                                <input type="number" step="0.01" required value={editingLoan.amount} onChange={e => setEditingLoan({...editingLoan, amount: e.target.value})} className="flex-1 p-2 border rounded-lg text-sm" />
                                            </div>
                                            <div className="flex gap-2">
                                                <button type="button" onClick={() => setEditingLoan(null)} className="flex-1 py-1.5 bg-gray-200 rounded-lg text-xs font-bold">Cancelar</button>
                                                <button type="submit" className="flex-1 py-1.5 bg-blue-600 text-white rounded-lg text-xs font-bold">Salvar</button>
                                            </div>
                                        </form>
                                    ) : confirmDeleteLoanId === loan.id ? (
                                        <div className="p-4 bg-red-50 border-b border-red-200 animate-fade-in text-center">
                                            <p className="text-sm font-bold text-red-700 mb-2">Apagar contrato inteiro?</p>
                                            <div className="flex gap-2">
                                                <button onClick={() => setConfirmDeleteLoanId(null)} className="flex-1 py-1.5 bg-gray-200 rounded-lg text-xs font-bold">Cancelar</button>
                                                <button onClick={() => executeDeleteLoan(loan.id)} className="flex-1 py-1.5 bg-red-600 text-white rounded-lg text-xs font-bold">Sim, Apagar</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="p-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center relative">
                                            <div>
                                                <p className="text-xs text-gray-500 uppercase font-bold tracking-wide">Data: {formatDate(loan.date)}</p>
                                                <p className="font-black text-gray-800 text-lg">Empréstimo: {formatMoney(loan.amount)}</p>
                                            </div>
                                            
                                            {!loan.isPaidOff && (
                                                <div className="absolute top-2 right-2">
                                                    {loan.isLoanOK ? (
                                                        <span className="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-1 rounded shadow-sm uppercase">
                                                            OK ({loan.loanDisplayMonthStr}) ✅
                                                        </span>
                                                    ) : (
                                                        <span className="bg-red-100 text-red-700 text-[10px] font-bold px-2 py-1 rounded shadow-sm animate-pulse uppercase">
                                                            FALTA {loan.loanDisplayMonthStr}
                                                        </span>
                                                    )}
                                                </div>
                                            )}

                                            <div className="flex gap-2 text-gray-400 mt-6">
                                                <button onClick={() => setEditingLoan({id: loan.id, date: loan.date, amount: loan.amount})} className="hover:text-blue-600"><IconEdit /></button>
                                                <button onClick={() => setConfirmDeleteLoanId(loan.id)} className="hover:text-red-500"><IconDelete /></button>
                                            </div>
                                        </div>
                                    )}

                                    <div className="p-4">
                                        {loan.isPaidOff ? (
                                            <div className="text-center py-2 text-green-600 font-bold bg-green-50 rounded-lg">✅ Contrato Quitado!</div>
                                        ) : (
                                            <>
                                                <div className="flex justify-between items-end mb-3">
                                                    <div>
                                                        <p className="text-xs text-gray-500">Saldo Devedor (Principal):</p>
                                                        <p className="text-xl font-bold text-red-600">{formatMoney(loan.currentPrincipal)}</p>
                                                    </div>
                                                    <button onClick={() => setPayingLoanId(loan.id)} className="bg-green-100 text-green-700 px-4 py-2 rounded-xl text-sm font-bold shadow-sm border border-green-200">+ Pagar Este</button>
                                                </div>
                                                
                                                <div className="flex justify-between items-center bg-orange-50 px-3 py-2 rounded-lg border border-orange-100 mb-4">
                                                    <p className="text-xs text-orange-800 font-medium">Juros (10%): {formatMoney(loan.baseInterest)}</p>
                                                    <p className="text-sm text-orange-900 font-black">Quitação: {formatMoney(loan.currentPrincipal + loan.baseInterest)}</p>
                                                </div>

                                                {payingLoanId === loan.id && (
                                                    <form onSubmit={handleAddPayment} className="mb-4 bg-white shadow-md p-4 rounded-xl border border-gray-200 animate-fade-in relative z-10">
                                                        <p className="text-sm font-bold text-gray-800 mb-3">Novo Pagamento</p>
                                                        <div className="flex gap-2 mb-3">
                                                            <input type="date" value={paymentDate} onChange={e => setPaymentDate(e.target.value)} required className="w-1/3 p-2 border rounded-lg bg-gray-50 text-sm" />
                                                            <input type="number" step="0.01" value={paymentAmount} onChange={e => setPaymentAmount(e.target.value)} placeholder="Valor (R$)" required className="flex-1 p-2 border rounded-lg bg-gray-50 text-sm" />
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <button type="button" onClick={() => setPayingLoanId(null)} className="flex-1 py-2 bg-gray-100 rounded-lg text-sm font-bold">Cancelar</button>
                                                            <button type="submit" className="flex-1 py-2 bg-green-600 text-white rounded-lg text-sm font-bold">Confirmar</button>
                                                        </div>
                                                    </form>
                                                )}
                                            </>
                                        )}

                                        {loan.processedPayments.length > 0 && (
                                            <div className="mt-4 border-t border-gray-100 pt-3">
                                                <p className="text-xs font-bold text-gray-400 mb-2 uppercase">Pagamentos:</p>
                                                <div className="space-y-2">
                                                    {[...loan.processedPayments].reverse().map(p => (
                                                        <div key={p.id} className="bg-gray-50 p-2.5 rounded-lg border border-gray-100">
                                                            {editingPayment && editingPayment.id === p.id ? (
                                                                <form onSubmit={handleSaveEditPayment} className="animate-fade-in">
                                                                    <div className="flex gap-2 mb-2">
                                                                        <input type="date" required value={editingPayment.date} onChange={e => setEditingPayment({...editingPayment, date: e.target.value})} className="w-1/3 p-1 border rounded text-xs" />
                                                                        <input type="number" step="0.01" required value={editingPayment.amount} onChange={e => setEditingPayment({...editingPayment, amount: e.target.value})} className="flex-1 p-1 border rounded text-xs" />
                                                                    </div>
                                                                    <div className="flex gap-2">
                                                                        <button type="button" onClick={() => setEditingPayment(null)} className="flex-1 bg-gray-200 rounded text-[10px] font-bold py-1">Cancelar</button>
                                                                        <button type="submit" className="flex-1 bg-blue-600 text-white rounded text-[10px] font-bold py-1">Salvar</button>
                                                                    </div>
                                                                </form>
                                                            ) : confirmDeletePaymentId?.id === p.id ? (
                                                                <div className="animate-fade-in flex flex-col gap-2">
                                                                    <p className="text-xs text-red-600 font-bold text-center">Apagar pagamento?</p>
                                                                    <div className="flex gap-2">
                                                                        <button onClick={() => setConfirmDeletePaymentId(null)} className="flex-1 bg-gray-200 rounded text-[10px] font-bold py-1">Cancelar</button>
                                                                        <button onClick={executeDeletePayment} className="flex-1 bg-red-600 text-white rounded text-[10px] font-bold py-1">Apagar</button>
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <div className="flex justify-between items-center">
                                                                    <div>
                                                                        <div className="flex items-center gap-1.5">
                                                                            <span className="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                                                                            <span className="font-bold text-sm text-gray-700">{formatMoney(p.amount)}</span>
                                                                            <span className="text-[10px] text-gray-400 ml-1">({formatDate(p.date)})</span>
                                                                        </div>
                                                                        <p className="text-[10px] text-gray-500 ml-3 mt-0.5">Juros: {formatMoney(p.interestPaid)} | Abateu: {formatMoney(p.amortized)}</p>
                                                                    </div>
                                                                    <div className="flex gap-2 text-gray-400">
                                                                        <button onClick={() => setEditingPayment({loanId: loan.id, id: p.id, date: p.date, amount: p.amount})} className="hover:text-blue-600 p-1"><IconEdit /></button>
                                                                        <button onClick={() => setConfirmDeletePaymentId({loanId: loan.id, id: p.id})} className="hover:text-red-500 p-1"><IconDelete /></button>
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {clientData.loans.length === 0 && <p className="text-center text-gray-400 py-10">Nenhum contrato ativo.</p>}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto bg-gray-50 min-h-screen shadow-2xl relative overflow-hidden flex flex-col">
                    <div className="bg-white pt-10 pb-4 px-6 shadow-sm z-0">
                        <h1 className="text-2xl font-black text-gray-800 tracking-tight">Finanças <span className="text-blue-600">Pro</span></h1>
                    </div>
                    <div className="flex bg-white px-4 border-b border-gray-200">
                        <button className={`flex-1 py-3 text-center text-sm transition-colors ${activeTab === 'dashboard' ? 'tab-active' : 'text-gray-500'}`} onClick={() => setActiveTab('dashboard')}>Painel</button>
                        <button className={`flex-1 py-3 text-center text-sm transition-colors ${activeTab === 'clients' ? 'tab-active' : 'text-gray-500'}`} onClick={() => setActiveTab('clients')}>Clientes</button>
                    </div>
                    <div className="flex-1 overflow-y-auto hide-scroll pb-10">
                        {activeTab === 'dashboard' ? <Dashboard onExport={handleExportBackup} onImport={handleImportBackup} /> : <ClientsList />}
                    </div>
                    {selectedClient && (
                        <ClientView clientData={globalStats.processedClients.find(c => c.id === selectedClient.id)} availableMoney={globalStats.availableMoney} />
                    )}
                    {toastMessage && (
                        <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-5 py-3 rounded-full shadow-2xl z-50 font-medium text-sm toast-anim whitespace-nowrap">
                            {toastMessage}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
